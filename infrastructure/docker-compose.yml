name: inmobi-intel

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: inmobi-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: inmobi
      POSTGRES_PASSWORD: inmobi_dev
      POSTGRES_DB: inmobi_intel
    volumes:
      - inmobi-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inmobi -d inmobi_intel"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  inmobi-pg-data:
    name: inmobi-pg-data
